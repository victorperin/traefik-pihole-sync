version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: traefik-pihole-dns-sync
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - TRAEFIK_API_URL=${TRAEFIK_API_URL:-http://traefik:8080}
      - PIHOLE_URL=${PIHOLE_URL:-http://pihole:80}
      - PIHOLE_PASSWORD=${PIHOLE_PASSWORD}
      - SYNC_INTERVAL=${SYNC_INTERVAL:-60000}
      - DEFAULT_DOMAIN=${DEFAULT_DOMAIN:-local}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./config:/app/config:ro
    networks:
      - dns-sync
    depends_on:
      - traefik
      - pihole

  # Traefik (for testing - optional)
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    networks:
      - dns-sync
    environment:
      - TZ=UTC

  # Pi-hole (for testing - optional)
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    ports:
      - "8053:53/tcp"
      - "8053:53/udp"
      - "8081:80"
    environment:
      - WEBPASSWORD=${PIHOLE_PASSWORD:-admin}
      - PIHOLE_DNS_=8.8.8.8
      - DNSMASQ_LISTENING=local
    volumes:
      - pihole-data:/etc/pihole
      - pihole-dnsmasq:/etc/dnsmasq.d
    networks:
      - dns-sync
    dns:
      - 127.0.0.1
      - 8.8.8.8

networks:
  dns-sync:
    driver: bridge

volumes:
  pihole-data:
  pihole-dnsmasq:
