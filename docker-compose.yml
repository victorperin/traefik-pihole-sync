version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: traefik-pihole-dns-sync
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - TRAEFIK_API_URL=${TRAEFIK_API_URL:-http://traefik:8080}
      - PIHOLE_URL=${PIHOLE_URL:-http://pihole:80}
      - PIHOLE_PASSWORD=${PIHOLE_PASSWORD}
      - SYNC_INTERVAL=${SYNC_INTERVAL:-60000}
      - DEFAULT_DOMAIN=${DEFAULT_DOMAIN:-local}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - REVERSE_PROXY_IPS=${REVERSE_PROXY_IPS}
    volumes:
      - ./config:/app/config:ro
    networks:
      - dns-sync
    depends_on:
      - traefik
      - pihole
    profiles:
      - default

  # Debug version of the app with Node.js inspector
  app-debug:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: traefik-pihole-dns-sync-debug
    restart: unless-stopped
    command: ["node", "--use-system-ca", "--inspect=xxx.xxx.xxx.xxx:9229", "dist/index.js"]
    ports:
      - "9229:9229"
    environment:
      - NODE_ENV=development
      - TRAEFIK_API_URL=${TRAEFIK_API_URL:-http://traefik:8080}
      - PIHOLE_URL=${PIHOLE_URL:-http://pihole:80}
      - PIHOLE_PASSWORD=${PIHOLE_PASSWORD}
      - SYNC_INTERVAL=${SYNC_INTERVAL:-60000}
      - DEFAULT_DOMAIN=${DEFAULT_DOMAIN:-local}
      - LOG_LEVEL=debug
      - REVERSE_PROXY_IPS=${REVERSE_PROXY_IPS}
    volumes:
      - ./config:/app/config:ro
    networks:
      - dns-sync
    depends_on:
      - traefik
      - pihole
    profiles:
      - debug

  # Traefik (for testing - optional)
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    ports:
      - "1081:8080"
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    networks:
      - dns-sync
    environment:
      - TZ=UTC

  # Pi-hole (for testing - optional)
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    ports:
      - "8053:53/tcp"
      - "8053:53/udp"
      - "1080:80"
    environment:
      - WEBPASSWORD=${PIHOLE_PASSWORD:-admin}
      - PIHOLE_DNS_=xxx.xxx.xxx.xxx
      - DNSMASQ_LISTENING=local
    volumes:
      - pihole-data:/etc/pihole
      - pihole-dnsmasq:/etc/dnsmasq.d
    networks:
      - dns-sync
    dns:
      - xxx.xxx.xxx.xxx
      - xxx.xxx.xxx.xxx
    shm_size: '1gb'

networks:
  dns-sync:
    driver: bridge

volumes:
  pihole-data:
  pihole-dnsmasq:
