version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: traefik-pihole-dns-sync
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=10m,mode=1777
    environment:
      - NODE_ENV=production
      - TRAEFIK_API_URL=${TRAEFIK_API_URL:-http://traefik:8080}
      - PIHOLE_URL=${PIHOLE_URL:-http://pihole:80}
      - PIHOLE_PASSWORD=${PIHOLE_PASSWORD}
      - SYNC_INTERVAL=${SYNC_INTERVAL:-60000}
      - DEFAULT_DOMAIN=${DEFAULT_DOMAIN:-local}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - REVERSE_PROXY_IPS=${REVERSE_PROXY_IPS}
    networks:
      - dns-sync

networks:
  dns-sync:
    driver: bridge
